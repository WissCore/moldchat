name: Feature request
description: Suggest a new feature or improvement.
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: threat-model
    attributes:
      label: Threat-model impact
      description: Does this change observable metadata, traffic patterns, or trust assumptions? If unsure, say so.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
