# Reusable: invoked by .github/workflows/ci.yml as the build-test
# tier of the orchestrator. Also exposed via workflow_dispatch so
# operators can re-run just the Go build+test from the Actions UI
# without re-running the whole CI suite.
name: build-test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server:
    name: server (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: server/go.mod

      - name: Build
        run: go build -trimpath ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...
