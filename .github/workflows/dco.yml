name: dco

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Signed-off-by on every code-bearing commit in the PR
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          # --no-merges: per Linux Foundation guidance, merge commits are not
          # "contributions" and do not require a separate DCO sign-off.
          for sha in $(git rev-list --no-merges "$base..$head"); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "::error::Commit $sha is missing a Signed-off-by line."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "All commits must be signed off per the Developer Certificate of Origin."
            echo "Use 'git commit -s' or amend with 'git commit --amend -s --no-edit'."
            exit 1
          fi
