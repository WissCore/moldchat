# NOTE: actions are tag-pinned for readability; SHA-pin all `uses:` before going live.
name: dco

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Signed-off-by on every commit in the PR
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list "$base..$head"); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "::error::Commit $sha is missing a Signed-off-by line."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "All commits must be signed off per the Developer Certificate of Origin."
            echo "Use 'git commit -s' or amend with 'git commit --amend -s --no-edit'."
            exit 1
          fi
