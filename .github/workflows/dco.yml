# Reusable: invoked by .github/workflows/ci.yml as a Tier 1 fast
# check, gated on github.event_name == 'pull_request' because the
# job below reads pull_request.base.sha / head.sha which are empty
# on push events.
name: dco

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Signed-off-by on every code-bearing commit in the PR
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          # --no-merges: per Linux Foundation guidance, merge commits are not
          # "contributions" and do not require a separate DCO sign-off.
          for sha in $(git rev-list --no-merges "$base..$head"); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "::error::Commit $sha is missing a Signed-off-by line."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "All commits must be signed off per the Developer Certificate of Origin."
            echo "Use 'git commit -s' or amend with 'git commit --amend -s --no-edit'."
            exit 1
          fi
