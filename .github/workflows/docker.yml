# Builds a multi-stage container image, pushes it to ghcr.io with BuildKit
# SLSA provenance and SBOM attestations, and signs it via keyless cosign.
#
# Triggers:
#   workflow_call — invoked by .github/workflows/ci.yml as a Tier 3
#     feature-level validation. The push step is naturally skipped
#     because github.ref on PR / main-push is not a tag.
#   push of a server-vX.Y.Z tag — actually publishes and signs the image.
#     This trigger remains independent of ci.yml so a tag push does
#     not have to wait for the full CI suite.
#   workflow_dispatch — manual escape hatch (no push).
#
# Push to ghcr is gated on tag refs only; PR / main-push / dispatch
# runs build the image without publishing, which proves the
# Dockerfile is healthy without producing release artifacts.
name: docker

on:
  workflow_call:
  workflow_dispatch:
  push:
    tags:
      - 'server-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/server-v')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/moldd
          tags: |
            type=match,pattern=server-v(.*),group=1
            type=ref,event=branch
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=moldd
            org.opencontainers.image.description=MoldChat server
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=WissCore

      - name: Build and (on tags) push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: ./server
          push: ${{ startsWith(github.ref, 'refs/tags/server-v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/server-v')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image (keyless)
        if: startsWith(github.ref, 'refs/tags/server-v')
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in ${TAGS}; do
            cosign sign --yes "${tag}@${DIGEST}"
          done
