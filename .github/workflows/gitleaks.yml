# Reusable: invoked by .github/workflows/ci.yml as a Tier 1 fast
# check. gitleaks is invoked via the binary installed by mise (the
# version is pinned in .mise.toml + mise.lock), so the local
# pre-push hook and CI run the exact same scanner with the exact
# same arguments.
name: gitleaks

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise (without auto-installing all tools)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4
        with:
          install: false

      - name: Install gitleaks at the version pinned in mise.lock
        run: mise install gitleaks

      - name: Run gitleaks
        run: mise x gitleaks -- gitleaks detect --redact -v
