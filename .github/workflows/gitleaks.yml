# NOTE: actions are tag-pinned for readability; SHA-pin all `uses:` before going live.
# gitleaks is invoked via the binary installed by mise (the version is pinned in
# .mise.toml + mise.lock), so the local pre-push hook and CI run the exact same
# scanner with the exact same arguments.
name: gitleaks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Run gitleaks
        run: gitleaks detect --redact -v
