# NOTE: actions are tag-pinned for readability; SHA-pin all `uses:` before going live.
name: osv-scanner

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '13 5 * * 1'  # Monday 05:13 UTC

permissions:
  contents: read

jobs:
  scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./
