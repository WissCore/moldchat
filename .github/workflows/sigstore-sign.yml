# Triggered on component-versioned tag pushes (server-vX.Y.Z).
# Builds the binary, generates an SBOM, and produces SLSA build provenance
# and SBOM attestations signed via keyless Sigstore (OIDC).
name: sigstore-sign

on:
  push:
    tags:
      - 'server-v*'

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: server/go.mod
          cache: false  # release pipeline: avoid cache poisoning into signed artifacts

      - name: Build
        working-directory: server
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w" -o ../dist/moldd ./cmd/moldd

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: ./server
          format: spdx-json
          output-file: dist/moldd.spdx.json
          upload-release-assets: false

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-path: dist/moldd

      - name: Attest SBOM
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b  # v2
        with:
          subject-path: dist/moldd
          sbom-path: dist/moldd.spdx.json

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/moldd \
            dist/moldd.spdx.json \
            --repo "${{ github.repository }}" \
            --clobber
