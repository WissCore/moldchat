# Triggered on component-versioned tag pushes (server-vX.Y.Z).
#
# Job layout (each artifact is recognised by a different verifier):
#   build      Builds the binary, generates an SBOM, signs the binary with
#              cosign keyless (Rekor-anchored .sigstore.json bundle), and
#              attaches GitHub-native build/SBOM attestations (gh attestation
#              verify UX).
#   provenance Calls the SLSA generic generator to emit a .intoto.jsonl
#              provenance file alongside the binary in the release. Required
#              for OpenSSF Scorecard's releasesHaveProvenance probe, which
#              only recognises .intoto.jsonl on release assets.
name: sigstore-sign

on:
  push:
    tags:
      - 'server-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: server/go.mod
          cache: false  # release pipeline: avoid cache poisoning into signed artifacts

      - name: Build
        working-directory: server
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w" -o ../dist/moldd ./cmd/moldd

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: ./server
          format: spdx-json
          output-file: dist/moldd.spdx.json
          upload-release-assets: false

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign binary (keyless, bundle)
        working-directory: dist
        run: |
          cosign sign-blob --yes \
            --bundle moldd.sigstore.json \
            moldd

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-path: dist/moldd

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v4
        with:
          subject-path: dist/moldd
          sbom-path: dist/moldd.spdx.json

      - name: Compute artifact hash for provenance job
        id: hash
        working-directory: dist
        run: |
          echo "hashes=$(sha256sum moldd | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/moldd \
            dist/moldd.spdx.json \
            dist/moldd.sigstore.json \
            --repo "${{ github.repository }}" \
            --clobber

  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    # SLSA trusted-builder is identified by tag ref; pinning by SHA
    # breaks both slsa-verifier's BuilderID check AND the upstream
    # builder-fetch.sh download (slsa-framework/slsa-github-generator#4216,
    # error: "slsa-generator-generic-linux-amd64: No such file or
    # directory"). The version tag is the load-bearing pin here.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0  # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
