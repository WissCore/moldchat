# MoldChat: pinned tool versions for reproducible local development.
# Run `mise install` after cloning to set up the toolchain.

[tools]
go     = "1.26.3"
java   = "temurin-21"
kotlin = "2.3.21"
node   = "24.15.0"
shellcheck = "latest"

# CLI helpers used in scripts and CI
gitleaks                                  = "latest"
golangci-lint                             = "latest"
ktlint                                    = "latest"
shfmt                                     = "latest"
lefthook                                  = "latest"
"aqua:securego/gosec"                     = "latest"
"aqua:mvdan/gofumpt"                      = "latest"
"aqua:crate-ci/typos"                     = "latest"
"aqua:rhysd/actionlint"                   = "latest"
"aqua:trufflesecurity/trufflehog"         = "latest"
"aqua:google/addlicense"                  = "latest"
"aqua:google/osv-scanner"                 = "latest"
"aqua:cli/cli"                            = "latest"
"npm:markdownlint-cli"                    = "latest"
"pipx:yamllint"                           = "latest"
"go:golang.org/x/vuln/cmd/govulncheck"    = "latest"

[env]
# Go module proxy and checksum DB defaults (explicit for clarity)
GOPROXY  = "https://proxy.golang.org,direct"
GOSUMDB  = "sum.golang.org"

# Disable Gradle daemon in CI-like local runs to make builds deterministic
GRADLE_OPTS = "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"

[tasks.smoke]
description = "Run binary smoke tests against a freshly built moldd. Mirrors the CI smoke job."
run = "go -C server test -tags smoke -count=1 -timeout=2m ./internal/smoke/..."
